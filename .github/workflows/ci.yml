name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_video_clipper
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret
      NEXTAUTH_URL: http://localhost:3000
      STORAGE_PROVIDER: supabase
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      SUPABASE_STORAGE_BUCKET: clips
      REAP_API_KEY: ci-placeholder
      REAP_BASE_URL: https://public.reap.video/api/v1/automation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Production preflight with staging-safe placeholders
        run: npm run production:check
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_URL: https://clipper.example.com
          NEXTAUTH_SECRET: ci_nextauth_secret_with_more_than_32_chars
          NEXTAUTH_URL: https://clipper.example.com
          ALLOW_DEV_AUTH: "false"
          AUTH_GITHUB_ID: ci-github-client-id
          AUTH_GITHUB_SECRET: ci-github-client-secret
          DATABASE_URL: postgresql://clipper:clipper@db.example.com:5432/ai_video_clipper
          REDIS_URL: rediss://redis.example.com:6379
          STORAGE_PROVIDER: supabase
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci_supabase_service_role_key_long_enough
          SUPABASE_STORAGE_BUCKET: clips
          REAP_API_KEY: ci_reap_api_key_long_enough
          REAP_WEBHOOK_SECRET: ci_reap_webhook_secret_with_more_than_32_chars
          REAP_WEBHOOK_REQUIRE_TIMESTAMP: "true"
          REAP_WEBHOOK_TOLERANCE_SECONDS: "300"
          REAP_RATE_LIMIT_MAX_REQUESTS: "10"
          REAP_RATE_LIMIT_WINDOW_MS: "60000"

      - name: Build
        run: npm run build

      - name: Validate production compose file
        run: |
          docker compose -f docker-compose.production.example.yml config
          docker compose --profile migrate -f docker-compose.production.example.yml config

      - name: Build production Docker image
        run: docker build --target runner -t ai-video-clipper:ci .
